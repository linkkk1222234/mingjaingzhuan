name: 三国杀名将传 卡牌手游&小游戏资讯日报

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = 北京时间 09:00，每天自动运行
  workflow_dispatch:       # 支持手动触发

jobs:
  generate-and-send-report:
    name: 生成并发送资讯日报
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 安装依赖
        run: pip install -r requirements.txt

      - name: 🚀 运行日报脚本
        env:
          DEEPSEEK_API_KEY:       ${{ secrets.DEEPSEEK_API_KEY }}
          GMAIL_SENDER_EMAIL:     ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD:     ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT_EMAIL: ${{ secrets.REPORT_RECIPIENT_EMAIL }}
        run: python scripts/daily_report.py

      - name: 🔔 失败通知
        if: failure()
        run: echo "❌ 日报任务失败，请进入 Actions 页面查看详细红色日志，并检查 Secrets 配置"
